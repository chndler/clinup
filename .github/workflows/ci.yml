name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test test/transforms.test.js test/clipboard.test.js test/cli.test.js
      - name: Check bundle freshness
        run: |
          node scripts/build.js
          git diff --exit-code index.html || {
            echo "::error::index.html is stale. Run 'npm run build' and commit."
            exit 1
          }
