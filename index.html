<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clinup</title>
<style>
  :root {
    color-scheme: dark;

    /* colors */
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border-subtle: #21262d;
    --border: #30363d;
    --border-hover: #484f58;
    --text-primary: #e6edf3;
    --text-secondary: #c9d1d9;
    --text-muted: #8b949e;
    --text-faint: #7d8590;
    --accent: #58a6ff;
    --success: #3fb950;
    --selection-bg: rgba(56, 139, 253, 0.3);
    --line-hover-bg: rgba(136, 198, 255, 0.04);
    --accent-tint: rgba(88, 166, 255, 0.04);

    /* fonts */
    --font-mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;

    /* type scale */
    --font-size-xs: 0.5625rem;   /* 9px  — card examples */
    --font-size-sm: 0.625rem;    /* 10px — labels, buttons, controls */
    --font-size-md: 0.6875rem;   /* 11px — card names, subtitle */
    --font-size-lg: 0.75rem;     /* 12px — content, code */
    --font-size-title: 0.875rem; /* 14px — title */

    /* spacing */
    --space-xs: 0.25rem;  /* 4px */
    --space-sm: 0.5rem;   /* 8px */
    --space-md: 1rem;     /* 16px */
    --space-lg: 1.5rem;   /* 24px */

    /* radii */
    --radius-sm: 2px;
    --radius-md: 3px;

    /* layout */
    --max-width: 800px;

    /* diff */
    --diff-removed-bg: rgba(248, 81, 73, 0.10);
    --diff-removed-bg-hover: rgba(248, 81, 73, 0.15);
    --diff-removed-gutter-bg: rgba(248, 81, 73, 0.20);
    --diff-removed-text: #ffa198;
    --diff-removed-gutter: #f85149;
    --diff-added-bg: rgba(63, 185, 80, 0.10);
    --diff-added-bg-hover: rgba(63, 185, 80, 0.15);
    --diff-added-gutter-bg: rgba(63, 185, 80, 0.20);
    --diff-added-text: #7ee787;
    --diff-added-gutter: #3fb950;
  }

  :root[data-theme="light"] {
    color-scheme: light;
    --bg-primary: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #e1e4e8;
    --border-subtle: #d8dee4;
    --border: #afb8c1;
    --border-hover: #8c959f;
    --text-primary: #1f2328;
    --text-secondary: #24292f;
    --text-muted: #57606a;
    --text-faint: #656d76;
    --accent: #0969da;
    --success: #1a7f37;
    --selection-bg: rgba(9, 105, 218, 0.2);
    --line-hover-bg: rgba(208, 215, 222, 0.32);
    --accent-tint: rgba(9, 105, 218, 0.06);
    --diff-removed-bg: rgba(255, 129, 130, 0.10);
    --diff-removed-bg-hover: rgba(255, 129, 130, 0.20);
    --diff-removed-gutter-bg: rgba(255, 129, 130, 0.30);
    --diff-removed-text: #82071e;
    --diff-removed-gutter: #cf222e;
    --diff-added-bg: rgba(46, 160, 67, 0.10);
    --diff-added-bg-hover: rgba(46, 160, 67, 0.20);
    --diff-added-gutter-bg: rgba(46, 160, 67, 0.30);
    --diff-added-text: #116329;
    --diff-added-gutter: #1a7f37;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  ::selection { background: var(--selection-bg); }

  body {
    font-family: var(--font-mono);
    background: var(--bg-primary);
    color: var(--text-secondary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--space-lg) var(--space-md);
  }

  .site-header {
    width: 100%;
    max-width: var(--max-width);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: var(--space-lg);
  }

  h1 {
    font-size: var(--font-size-title);
    font-weight: 600;
    color: var(--text-primary);
  }

  .subtitle {
    font-size: var(--font-size-md);
    color: var(--text-faint);
    margin-top: var(--space-xs);
  }

  .github-link {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    color: var(--text-faint);
    text-decoration: none;
    font-size: var(--font-size-sm);
    width: fit-content;
  }

  .github-link:hover {
    color: var(--text-muted);
  }

  .theme-switch {
    display: flex;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .theme-option {
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: var(--font-mono);
    font-size: var(--font-size-sm);
    padding: 0.125rem var(--space-sm);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, color 0.15s;
  }
  .theme-option:hover:not(.active) { color: var(--text-muted); }
  .theme-option:not(.active) { background: var(--bg-tertiary); }
  .theme-option.active { color: var(--text-secondary); cursor: default; }

  .container {
    width: 100%;
    max-width: var(--max-width);
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
  }

  label, .section-label {
    font-size: var(--font-size-sm);
    font-weight: 500;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .input-box, .output-box {
    width: 100%;
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: var(--font-size-lg);
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .input-box:focus-within, .output-box:focus { border-color: var(--accent); outline: none; }

  .input-box {
    display: flex;
    min-height: 160px;
    overflow: hidden;
  }

  .input-box textarea {
    flex: 1;
    width: 0;
    background: none;
    border: none;
    resize: none;
    outline: none;
    padding: var(--space-sm);
    font: inherit;
    color: inherit;
  }

  .input-gutter {
    min-width: 2.5rem;
    padding: var(--space-sm) 0;
    background: var(--bg-primary);
    border-radius: var(--radius-md) 0 0 var(--radius-md);
    overflow: hidden;
    flex-shrink: 0;
  }

  .input-box.no-line-nums .input-gutter { display: none; }
  .input-box.no-wrap textarea { white-space: pre; overflow-wrap: normal; }

  .line-num {
    text-align: right;
    padding: 0 var(--space-sm);
    color: var(--text-faint);
    font-size: var(--font-size-lg);
    line-height: 1.5;
    user-select: none;
  }

  .output-box {
    min-height: 64px;
    cursor: default;
    overflow: auto;
    padding: var(--space-sm) 0;
    position: relative;
  }

  .output-box.no-wrap .output-lines-wrap {
    min-width: max-content;
  }

  .output-line {
    display: flex;
  }

  .output-line:hover { background: var(--line-hover-bg); }

  .output-gutter-bg {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    width: 2.5rem;
    background: var(--bg-primary);
    border-radius: var(--radius-md) 0 0 var(--radius-md);
    pointer-events: none;
  }

  .output-box.no-line-nums .output-gutter-bg { display: none; }

  .output-line .line-num {
    min-width: 2.5rem;
    flex-shrink: 0;
    position: relative;
  }

  .output-line .line-text {
    flex: 1;
    white-space: pre-wrap;
    word-break: break-all;
    padding: 0 var(--space-sm);
  }

  .section-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-xs);
    min-height: 1.125rem;
    margin-bottom: var(--space-xs);
  }

  .output-box.empty { padding: var(--space-sm); }
  .output-box.empty:not(.no-line-nums) { padding-left: 3.25rem; }
  .output-box.empty .output-placeholder { color: var(--text-faint); }

  .output-box.no-line-nums .line-num { display: none; }
  .output-box.no-wrap .line-text { white-space: pre; }

  .section-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: var(--space-sm);
    margin-top: var(--space-xs);
  }

  .action-btn {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    padding: var(--space-xs) var(--space-sm);
    font-family: var(--font-mono);
    font-size: var(--font-size-sm);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .action-btn:hover { background: var(--border); color: var(--text-primary); }
  .action-btn.copied { color: var(--success); border-color: var(--success); }

  .pipeline-connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: fit-content;
    margin-left: var(--space-md);
  }

  .pipeline-connector::before {
    content: "";
    width: 1px;
    height: 0.5rem;
    background: var(--border);
  }

  .pipeline-connector::after {
    content: "";
    width: 0;
    height: 0;
    border-left: 3px solid transparent;
    border-right: 3px solid transparent;
    border-top: 4px solid var(--border);
  }

  .transforms-wrap {
    border: 1px dashed var(--border-subtle);
    border-radius: var(--radius-md);
    padding: var(--space-sm);
  }

  .transforms-wrap .section-label {
    display: block;
    margin-bottom: var(--space-xs);
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-xs);
    max-width: 100%;
  }

  .option-card:last-child:nth-child(odd) { grid-column: 1 / -1; }

  @media (max-width: 540px) {
    .options { grid-template-columns: 1fr; }
  }

  .option-card, .toggle-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .option-card:hover, .toggle-btn:hover { border-color: var(--border-hover); }

  .option-card {
    padding: 0.375rem var(--space-sm);
    transition: opacity 0.15s, border-color 0.15s, background 0.15s;
    min-width: 0;
  }
  .option-card:not(.disabled) { border-color: var(--border); background: var(--accent-tint); }
  .option-card.disabled { opacity: 0.5; border-color: var(--border-subtle); background: var(--bg-secondary); }

  .option-label {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: var(--font-size-md);
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }

  .option-label input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .toggle-icon {
    color: var(--text-faint);
    transition: color 0.15s;
  }

  .toggle-btn.active .toggle-icon,
  .option-card:not(.disabled) .toggle-icon {
    color: var(--accent);
  }

  .option-example {
    display: flex;
    align-items: baseline;
    gap: var(--space-sm);
    margin-top: var(--space-xs);
    padding-left: 1.1rem;
    font-size: var(--font-size-xs);
    line-height: 1.4;
    color: var(--text-faint);
    min-width: 0;
    overflow: hidden;
  }

  .option-example code {
    background: var(--bg-primary);
    padding: var(--space-xs) var(--space-xs);
    border-radius: var(--radius-sm);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-muted);
  }

  .option-example .arrow {
    color: var(--success);
    flex-shrink: 0;
  }

  .ws { color: var(--text-muted); opacity: 0.5; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
    align-items: center;
  }

  .toggle-btn {
    padding: 0.125rem var(--space-sm);
    font-family: var(--font-mono);
    font-size: var(--font-size-sm);
    color: var(--text-muted);
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .toggle-btn.active {
    color: var(--text-secondary);
    border-color: var(--border);
    background: var(--accent-tint);
  }

  .diff-summary {
    font-size: var(--font-size-xs);
    color: var(--text-faint);
  }

  .diff-summary-added { color: var(--diff-added-text); }
  .diff-summary-removed { color: var(--diff-removed-text); margin-left: var(--space-xs); }

  .output-box.diff-mode .output-gutter-bg {
    width: 5.875rem;
  }

  .output-box.diff-mode .line-num,
  .output-box.diff-mode .diff-indicator {
    background: var(--bg-primary);
    position: relative;
  }

  .output-box.diff-mode .line-text {
    padding-left: var(--space-sm);
  }

  .diff-indicator {
    min-width: 0.875rem;
    text-align: center;
    user-select: none;
    flex-shrink: 0;
    font-size: var(--font-size-sm);
  }

  .output-line.diff-removed {
    --diff-bg: var(--diff-removed-bg); --diff-bg-hover: var(--diff-removed-bg-hover);
    --diff-gutter-bg: var(--diff-removed-gutter-bg); --diff-gutter-color: var(--diff-removed-gutter);
    --diff-text: var(--diff-removed-text);
  }
  .output-line.diff-added {
    --diff-bg: var(--diff-added-bg); --diff-bg-hover: var(--diff-added-bg-hover);
    --diff-gutter-bg: var(--diff-added-gutter-bg); --diff-gutter-color: var(--diff-added-gutter);
    --diff-text: var(--diff-added-text);
  }

  .output-line:is(.diff-removed, .diff-added) { background: var(--diff-bg); }
  .output-line:is(.diff-removed, .diff-added):hover { background: var(--diff-bg-hover); }
  .output-line:is(.diff-removed, .diff-added) .line-num,
  .output-line:is(.diff-removed, .diff-added) .diff-indicator { background: var(--diff-gutter-bg); color: var(--diff-gutter-color); }
  .output-line:is(.diff-removed, .diff-added) .line-text { color: var(--diff-text); }
</style>
<script>
  (function() {
    const t = localStorage.getItem("theme")
      || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.dataset.theme = t;
  })();
</script>
</head>
<body>

<header class="site-header">
  <div>
    <h1>clinup</h1>
    <p class="subtitle">Paste CLI output, get clean text.</p>
  </div>
  <div class="theme-switch" role="radiogroup" aria-label="Color theme">
    <button class="theme-option" data-theme="dark" type="button" role="radio">☾ dark</button>
    <button class="theme-option" data-theme="light" type="button" role="radio">☀ light</button>
  </div>
</header>

<div class="container">
  <div>
    <div class="section-header">
      <label for="input">Input</label>
      <div class="controls">
        <button class="toggle-btn active" id="toggle-input-lines" type="button" title="Show line numbers in the gutter">
          <span class="toggle-icon" aria-hidden="true">✓</span> lines
        </button>
        <button class="toggle-btn active" id="toggle-input-wrap" type="button" title="Wrap long lines to fit the viewport">
          <span class="toggle-icon" aria-hidden="true">✓</span> wrap
        </button>
      </div>
    </div>
    <div class="input-box">
      <div class="input-gutter" id="input-gutter"><div class="line-num">1</div></div>
      <textarea id="input" placeholder="Paste CLI commands or text here..." spellcheck="false" autofocus></textarea>
    </div>
  </div>

  <div class="pipeline-connector"></div>

  <div class="transforms-wrap">
    <span class="section-label">Transforms</span>
    <div class="options">
    <div class="option-card">
      <label class="option-label">
        <input type="checkbox" id="opt-strip-rules" checked><span class="toggle-icon" aria-hidden="true">✓</span> strip-rules
      </label>
      <div class="option-example">
        <code>────────────</code>
        <span class="arrow">&rarr;</span>
        <code><em>(removed)</em></code>
      </div>
    </div>
    <div class="option-card">
      <label class="option-label">
        <input type="checkbox" id="opt-strip-trailing" checked><span class="toggle-icon" aria-hidden="true">✓</span> strip-trailing
      </label>
      <div class="option-example">
        <code>hello&nbsp; &nbsp; &nbsp;\n</code>
        <span class="arrow">&rarr;</span>
        <code>hello\n</code>
      </div>
    </div>
    <div class="option-card">
      <label class="option-label">
        <input type="checkbox" id="opt-join" checked><span class="toggle-icon" aria-hidden="true">✓</span> join-continuations
      </label>
      <div class="option-example">
        <code>cmd \\n    --flag</code>
        <span class="arrow">&rarr;</span>
        <code>cmd --flag</code>
      </div>
    </div>
    <div class="option-card">
      <label class="option-label">
        <input type="checkbox" id="opt-unwrap" checked><span class="toggle-icon" aria-hidden="true">✓</span> unwrap-paragraphs
      </label>
      <div class="option-example">
        <code>line one\n  continues here</code>
        <span class="arrow">&rarr;</span>
        <code>line one continues here</code>
      </div>
    </div>
    <div class="option-card">
      <label class="option-label">
        <input type="checkbox" id="opt-collapse" checked><span class="toggle-icon" aria-hidden="true">✓</span> collapse-spaces
      </label>
      <div class="option-example">
        <code>too&nbsp; &nbsp;many&nbsp; &nbsp;spaces</code>
        <span class="arrow">&rarr;</span>
        <code>too many spaces</code>
      </div>
    </div>
    <div class="option-card">
      <label class="option-label">
        <input type="checkbox" id="opt-trim" checked><span class="toggle-icon" aria-hidden="true">✓</span> trim-outer
      </label>
      <div class="option-example">
        <code>&nbsp; &nbsp;hello world&nbsp; &nbsp;</code>
        <span class="arrow">&rarr;</span>
        <code>hello world</code>
      </div>
    </div>
    </div>
  </div>

  <div class="pipeline-connector"></div>

  <div>
    <div class="section-header">
      <span class="section-label">Output</span>
      <div class="controls">
        <button class="toggle-btn" id="toggle-diff" type="button" title="Show what changed between input and output">
          <span class="toggle-icon" aria-hidden="true">·</span> diff
        </button>
        <button class="toggle-btn" id="toggle-whitespace" type="button" title="Reveal spaces (·) and tabs (→)">
          <span class="toggle-icon" aria-hidden="true">·</span> ws
        </button>
        <button class="toggle-btn active" id="toggle-line-nums" type="button" title="Show line numbers in the gutter">
          <span class="toggle-icon" aria-hidden="true">✓</span> lines
        </button>
        <button class="toggle-btn active" id="toggle-wrap" type="button" title="Wrap long lines to fit the viewport">
          <span class="toggle-icon" aria-hidden="true">✓</span> wrap
        </button>
      </div>
    </div>
    <div id="output" class="output-box empty" tabindex="0" role="region" aria-label="Cleaned output">
      <div class="output-gutter-bg"></div>
      <span class="output-placeholder">Cleaned text will appear here</span>
    </div>
    <div class="section-footer">
      <div id="diff-summary" class="diff-summary" style="display:none"></div>
      <button class="action-btn" id="copy-btn" title="Copy to clipboard">Copy</button>
    </div>
  </div>
  <a class="github-link" href="https://github.com/chndler/clinup" title="View source on GitHub"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>
</div>


<script>
  const themeOptions = document.querySelectorAll(".theme-option");

  function syncThemeSwitch() {
    const current = document.documentElement.dataset.theme;
    themeOptions.forEach(btn => {
      btn.classList.toggle("active", btn.dataset.theme === current);
      btn.setAttribute("aria-checked", btn.dataset.theme === current);
    });
  }

  themeOptions.forEach(btn => {
    btn.addEventListener("click", () => {
      document.documentElement.dataset.theme = btn.dataset.theme;
      localStorage.setItem("theme", btn.dataset.theme);
      inputFontSynced = false;
      syncThemeSwitch();
    });
  });

  syncThemeSwitch();

  const input       = document.getElementById("input");
  const output      = document.getElementById("output");
  const copyBtn     = document.getElementById("copy-btn");
  const optStripTrailing = document.getElementById("opt-strip-trailing");
  const optRules         = document.getElementById("opt-strip-rules");
  const optJoin     = document.getElementById("opt-join");
  const optUnwrap   = document.getElementById("opt-unwrap");
  const optCollapse = document.getElementById("opt-collapse");
  const optTrim     = document.getElementById("opt-trim");
  const toggleLineNums   = document.getElementById("toggle-line-nums");
  const toggleWhitespace = document.getElementById("toggle-whitespace");
  const toggleWrap       = document.getElementById("toggle-wrap");
  const toggleDiff       = document.getElementById("toggle-diff");
  const diffSummary      = document.getElementById("diff-summary");
  const inputGutter      = document.getElementById("input-gutter");
  const toggleInputLines = document.getElementById("toggle-input-lines");
  const toggleInputWrap  = document.getElementById("toggle-input-wrap");
  const inputBox         = document.querySelector(".input-box");
  const optionCards = document.querySelectorAll(".option-card");

  let lastClean = "";
  let lastRaw = "";
  let debounceTimer;
  let inputFontSynced = false;

  function setToggleIcon(el, active) {
    const icon = el.querySelector(".toggle-icon");
    if (icon) icon.textContent = active ? "\u2713" : "\u00B7";
  }

  function unwrapParagraphs(text, trim) {
    return text.split(/\n\s*\n/).map(para => {
      const unwrapped = para.replace(/\n\s*/g, (match, offset) => {
        const rest = para.slice(offset + match.length);
        if (/^[-*+•] |^\d+[.)] |^#{1,6} /.test(rest)) return "\n";
        const before = para.slice(0, offset);
        const lastLine = before.substring(before.lastIndexOf("\n") + 1);
        if (/^\s*(?:[⏺•]\s*)?#{1,6} /.test(lastLine)) return "\n";
        return " ";
      });
      return trim ? unwrapped.trim() : unwrapped;
    }).join("\n\n");
  }

  function clean(text) {
    let result = text;
    if (optRules.checked) {
      result = result.replace(/(?:^\s*[\u2500-\u257F]{3,}\s*$\n?|\s+[\u2500-\u257F]{3,}\s*$)/gm, "");
    }
    if (optStripTrailing.checked) result = result.replace(/[^\S\n]+$/gm, "");
    if (optJoin.checked)     result = result.replace(/\\\s*\n\s*/g, " ");
    if (optUnwrap.checked)   result = unwrapParagraphs(result, optTrim.checked);
    if (optCollapse.checked) result = result.replace(/ {2,}/g, " ");
    if (optTrim.checked)     result = result.trim();
    return result;
  }

  function computeDiff(oldLines, newLines) {
    const m = oldLines.length;
    const n = newLines.length;
    const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        dp[i][j] = oldLines[i - 1] === newLines[j - 1]
          ? dp[i - 1][j - 1] + 1
          : Math.max(dp[i - 1][j], dp[i][j - 1]);
      }
    }
    const entries = [];
    let i = m, j = n;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && oldLines[i - 1] === newLines[j - 1]) {
        entries.push({ type: "unchanged", text: newLines[j - 1] });
        i--; j--;
      } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
        entries.push({ type: "added", text: newLines[j - 1] });
        j--;
      } else {
        entries.push({ type: "removed", text: oldLines[i - 1] });
        i--;
      }
    }

    return entries.reverse();
  }

  const gutterBg = output.querySelector(".output-gutter-bg");
  const placeholder = output.querySelector(".output-placeholder");

  const inputMirror = document.createElement("div");
  inputMirror.style.cssText = "position:fixed;left:-9999px;white-space:pre-wrap;overflow-wrap:break-word;box-sizing:border-box;";
  document.body.appendChild(inputMirror);

  let lastGutterCount = 1;

  function updateInputGutter(force) {
    const lines = input.value.split("\n");
    const wrapActive = isToggleActive(toggleInputWrap);

    if (!wrapActive && !force && lines.length === lastGutterCount) return;
    lastGutterCount = lines.length;

    let heights;
    if (wrapActive) {
      if (!inputFontSynced) {
        const cs = getComputedStyle(input);
        inputMirror.style.fontFamily = cs.fontFamily;
        inputMirror.style.fontSize = cs.fontSize;
        inputMirror.style.lineHeight = cs.lineHeight;
        inputMirror.style.letterSpacing = cs.letterSpacing;
        inputMirror.style.paddingLeft = cs.paddingLeft;
        inputMirror.style.paddingRight = cs.paddingRight;
        inputFontSynced = true;
      }
      inputMirror.style.width = input.clientWidth + "px";
      const frag = document.createDocumentFragment();
      lines.forEach(l => {
        const div = document.createElement("div");
        div.textContent = l || "\u00A0";
        frag.appendChild(div);
      });
      inputMirror.replaceChildren(frag);
      heights = Array.from(inputMirror.children, c => c.offsetHeight);
    }

    const frags = [];
    for (let i = 0; i < lines.length; i++) {
      const style = heights ? ' style="height:' + heights[i] + 'px"' : "";
      frags.push('<div class="line-num"' + style + '>' + (i + 1) + '</div>');
    }
    inputGutter.innerHTML = frags.join("");
  }

  let gutterRafPending = false;
  new ResizeObserver(() => {
    if (!gutterRafPending) {
      gutterRafPending = true;
      requestAnimationFrame(() => { updateInputGutter(true); gutterRafPending = false; });
    }
  }).observe(input);

  function renderLineContent(container, line) {
    if (!isToggleActive(toggleWhitespace)) {
      container.textContent = line || "\u00A0";
      return;
    }
    if (!line) { container.textContent = "\u00A0"; return; }
    const parts = line.split(/( +|\t+)/);
    for (const part of parts) {
      if (!part) continue;
      const wsChar = part[0] === " " ? "\u00B7" : part[0] === "\t" ? "\u2192" : null;
      if (wsChar) {
        const span = document.createElement("span");
        span.className = "ws";
        span.textContent = wsChar.repeat(part.length);
        span.dataset.raw = part;
        container.appendChild(span);
      } else {
        container.appendChild(document.createTextNode(part));
      }
    }
  }

  function renderLines(text) {
    const wrap = document.createElement("div");
    wrap.className = "output-lines-wrap";
    const lines = text.split("\n");
    lines.forEach((line, i) => {
      const row = document.createElement("div");
      row.className = "output-line";

      const num = document.createElement("span");
      num.className = "line-num";
      num.textContent = i + 1;

      const txt = document.createElement("span");
      txt.className = "line-text";
      renderLineContent(txt, line);

      row.appendChild(num);
      row.appendChild(txt);
      wrap.appendChild(row);
    });
    output.replaceChildren(gutterBg, wrap);
  }

  function renderDiffLines(rawText, cleanText) {
    const oldLines = rawText.split("\n");
    const newLines = cleanText.split("\n");
    const entries = computeDiff(oldLines, newLines);

    const wrap = document.createElement("div");
    wrap.className = "output-lines-wrap";
    let oldNum = 0, newNum = 0, removedCount = 0, addedCount = 0;
    entries.forEach(entry => {
      if (entry.type === "removed") { oldNum++; removedCount++; }
      else if (entry.type === "added") { newNum++; addedCount++; }
      else { oldNum++; newNum++; }

      const row = document.createElement("div");
      row.className = "output-line";
      if (entry.type !== "unchanged") row.classList.add("diff-" + entry.type);

      const numOld = document.createElement("span");
      numOld.className = "line-num";
      numOld.textContent = entry.type !== "added" ? oldNum : "";

      const numNew = document.createElement("span");
      numNew.className = "line-num";
      numNew.textContent = entry.type !== "removed" ? newNum : "";

      const indicator = document.createElement("span");
      indicator.className = "diff-indicator";
      if (entry.type === "removed") indicator.textContent = "−";
      else if (entry.type === "added") indicator.textContent = "+";

      const txt = document.createElement("span");
      txt.className = "line-text";
      renderLineContent(txt, entry.text);

      row.appendChild(numOld);
      row.appendChild(numNew);
      row.appendChild(indicator);
      row.appendChild(txt);
      wrap.appendChild(row);
    });

    output.replaceChildren(gutterBg, wrap);
    updateDiffSummary(addedCount, removedCount);
  }

  function updateDiffSummary(added, removed) {
    diffSummary.textContent = "";
    if (added || removed) {
      const addSpan = document.createElement("span");
      addSpan.className = "diff-summary-added";
      addSpan.textContent = "+" + added;
      const remSpan = document.createElement("span");
      remSpan.className = "diff-summary-removed";
      remSpan.textContent = "-" + removed;
      diffSummary.appendChild(addSpan);
      diffSummary.appendChild(remSpan);
    } else {
      diffSummary.textContent = "no changes";
    }
  }

  function renderOutput() {
    if (!lastClean) return;
    const diffActive = isToggleActive(toggleDiff);
    output.classList.toggle("diff-mode", diffActive);
    if (diffActive) {
      renderDiffLines(lastRaw, lastClean);
      diffSummary.style.display = "";
    } else {
      renderLines(lastClean);
      diffSummary.style.display = "none";
    }
  }

  function update() {
    const raw = input.value;
    if (!/\S/.test(raw)) {
      if (lastClean) {
        output.replaceChildren(gutterBg, placeholder);
        output.classList.add("empty");
        output.classList.remove("diff-mode");
        lastClean = "";
        lastRaw = "";
        diffSummary.textContent = "";
        diffSummary.style.display = "none";
      }
      return;
    }
    output.classList.remove("empty");
    lastRaw = raw;
    const cleaned = clean(raw);
    if (cleaned === lastClean) return;
    lastClean = cleaned;
    renderOutput();
  }

  function debouncedUpdate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(update, 60);
  }

  const cardPairs = [...optionCards].map(card => [card, card.querySelector("input[type=checkbox]")]);

  function syncCards() {
    cardPairs.forEach(([card, cb]) => {
      card.classList.toggle("disabled", !cb.checked);
      setToggleIcon(card, cb.checked);
    });
  }

  cardPairs.forEach(([card, cb]) => {
    card.addEventListener("click", (e) => {
      if (e.target.closest("label")) return;
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event("change"));
    });
  });

  input.addEventListener("input", () => {
    updateInputGutter();
    debouncedUpdate();
  });

  input.addEventListener("scroll", () => {
    inputGutter.scrollTop = input.scrollTop;
  });

  [optStripTrailing, optRules, optJoin, optUnwrap, optCollapse, optTrim].forEach(cb => cb.addEventListener("change", () => {
    syncCards();
    clearTimeout(debounceTimer);
    update();
  }));

  function isToggleActive(btn) {
    return btn.classList.contains("active");
  }

  function toggleButton(btn) {
    const active = btn.classList.toggle("active");
    setToggleIcon(btn, active);
    btn.setAttribute("aria-pressed", active);
    return active;
  }

  [[toggleInputLines, inputBox, "no-line-nums"],
   [toggleLineNums, output, "no-line-nums"],
   [toggleWrap, output, "no-wrap"]].forEach(([btn, target, cls]) => {
    btn.addEventListener("click", () => {
      target.classList.toggle(cls, !toggleButton(btn));
    });
  });

  toggleInputWrap.addEventListener("click", () => {
    const active = toggleButton(toggleInputWrap);
    inputBox.classList.toggle("no-wrap", !active);
    input.setAttribute("wrap", active ? "soft" : "off");
    updateInputGutter(true);
  });

  [toggleWhitespace, toggleDiff].forEach(btn => {
    btn.addEventListener("click", () => {
      toggleButton(btn);
      if (lastClean) renderOutput();
    });
  });

  syncCards();

  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.setAttribute("aria-pressed", btn.classList.contains("active"));
  });

  output.addEventListener("keydown", (e) => {
    if (e.key === "a" && (e.metaKey || e.ctrlKey) && !e.shiftKey) {
      e.preventDefault();
      const sel = window.getSelection();
      sel.removeAllRanges();
      const texts = output.querySelectorAll(".line-text");
      if (texts.length) {
        const range = document.createRange();
        range.setStartBefore(texts[0]);
        range.setEndAfter(texts[texts.length - 1]);
        sel.addRange(range);
      }
    }
  });

  output.addEventListener("copy", (e) => {
    if (!isToggleActive(toggleWhitespace)) return;
    const sel = window.getSelection();
    if (sel.isCollapsed) return;
    const fragment = sel.getRangeAt(0).cloneContents();
    fragment.querySelectorAll(".ws").forEach(ws => { ws.textContent = ws.dataset.raw; });
    const div = document.createElement("div");
    div.style.whiteSpace = "pre";
    div.appendChild(fragment);
    e.preventDefault();
    e.clipboardData.setData("text/plain", div.innerText);
  });

  function copyText(text) {
    // navigator.clipboard requires HTTPS/localhost — falls back for file:// URLs
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    return Promise.resolve();
  }

  let copyResetTimer;
  copyBtn.addEventListener("click", () => {
    const text = lastClean;
    if (!text) return;
    copyText(text).then(() => {
      copyBtn.textContent = "Copied!";
      copyBtn.classList.add("copied");
      clearTimeout(copyResetTimer);
      copyResetTimer = setTimeout(() => {
        copyBtn.textContent = "Copy";
        copyBtn.classList.remove("copied");
      }, 1500);
    });
  });
</script>

</body>
</html>
